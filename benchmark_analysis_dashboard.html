function mShort(m) { return MODEL_SHORT[m] || m.split('(')[0].trim(); }
function sShort(s) { return SOLVER_SHORT[s] || s; }
function qShort(q) { return q.length > 70 ? q.slice(0, 67) + '...' : q; }
function labShort(l) { return l.replace(/^lab_/, ''); }

/** Detect whether the loaded JSON is a partial_results or summary format */
function detectFormat(data) {
  if (data.results && Array.isArray(data.results) && data.results.length > 0 && data.results[0].question) {
    return 'partial';
  }
  return 'summary';
}

/** Whether the loaded JSON carries the enriched log_analytics block produced
 *  by scripts/build_dashboard_data.py. */
function hasLogAnalytics(data) {
  const la = data && data.log_analytics;
  return !!(la && la.per_pair && Object.keys(la.per_pair).length);
}

/** Look up the log_analytics entry for a (model, solver) pair, tolerating
 *  the small filename-vs-display formatting differences. */
function getPairAnalytics(la, model, solver) {
  if (!la || !la.per_pair) return null;
  // Direct key first
  const direct = la.per_pair[`${model}|${solver}`];
  if (direct) return direct;
  // Fall back: scan entries and match on solver + a fuzzy model comparison.
  // build_dashboard_data sanitises the model name (":" → "_", ".", etc) so
  // the extended key can differ from the summary one.
  const normalize = s => (s || '').replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
  const target = normalize(model);
  for (const v of Object.values(la.per_pair)) {
    if (v.solver === solver && normalize(v.model) === target) return v;
  }
  return null;
}

/** Derive pair_summary from raw results (same logic as analysis_engine.py) */
function derivePairSummary(results) {
  const stats = {};
  for (const r of results) {
    const key = r.model + '||' + r.solver;
    if (!stats[key]) stats[key] = { model: r.model, solver: r.solver, times: [], correct: [], tokIn: [], tokOut: [], tokTot: [], errors: {}, n_all: 0 };
    stats[key].n_all++;
    if (r.error_type) {
      stats[key].errors[r.error_type] = (stats[key].errors[r.error_type] || 0) + 1;
    }
    if (!r.successful) continue;
    stats[key].times.push(r.solver_elapsed_time);
    stats[key].correct.push(r.correct ? 1 : 0);
    stats[key].tokIn.push(r.tokens_input || 0);
    stats[key].tokOut.push(r.tokens_output || 0);
    stats[key].tokTot.push(r.tokens_total || 0);
  }
  const meanOf = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
  const sumOf = arr => arr.reduce((a,b)=>a+b,0);
  const summary = [];
  for (const data of Object.values(stats)) {
    const n = data.times.length;
    if (n === 0 && data.n_all === 0) continue;
    const meanTime = meanOf(data.times);
    const sumCorrect = sumOf(data.correct);
    const meanAcc = n ? sumCorrect / n : 0;
    const stdTime = n > 1 ? Math.sqrt(data.times.reduce((a, t) => a + (t - meanTime) ** 2, 0) / (n - 1)) : 0;
    const stdAcc = n > 1 ? Math.sqrt(data.correct.reduce((a, c) => a + (c - meanAcc) ** 2, 0) / (n - 1)) : 0;
    summary.push({
      model: data.model, solver: data.solver, n, n_all: data.n_all,
      correct: sumCorrect,
      accuracy_pct: n ? Math.round(sumCorrect / n * 1000) / 10 : 0,
      mean_time_s: Math.round(meanTime * 100) / 100,
      std_time_s: Math.round(stdTime * 100) / 100,
      std_accuracy_pct: Math.round(stdAcc * 1000) / 10,
      mean_tokens_input: Math.round(meanOf(data.tokIn)),
      mean_tokens_output: Math.round(meanOf(data.tokOut)),
      mean_tokens_total: Math.round(meanOf(data.tokTot)),
      sum_tokens_total: sumOf(data.tokTot),
      errors: data.errors,
    });
  }
  return summary.sort((a, b) => a.model.localeCompare(b.model) || a.solver.localeCompare(b.solver));
}

/** Derive per-lab question counts from raw results */
function deriveLabQuestions(results) {
  const labQs = {};
  for (const r of results) {
    if (!labQs[r.lab_name]) labQs[r.lab_name] = new Set();
    labQs[r.lab_name].add(r.question);
  }
  const out = {};
  for (const [lab, qs] of Object.entries(labQs)) {
    out[lab] = [...qs].sort();
  }
  return out;
}

function render(data) {

    </div>

      `<span class="meta-chip" title="${qs.map(q=>qShort(q)).join('\n')}">${labShort(lab)}: ${qs.length} questions</span>`
    ).join('')}</div>` : ''}
    ${failed.length ? `<div class="failed-banner">⚠ ${failed.length} failed lab(s): ${failed.map(f=>`<strong>${f.lab_name}</strong>`).join(', ')}</div>` : ''}
    <div class="metrics">

      <div class="metric"><div class="metric-label">total correct</div><div class="metric-value">${totalCorrect.toLocaleString()}</div></div>
      <div class="metric"><div class="metric-label">overall accuracy</div><div class="metric-value">${((totalCorrect/totalRuns)*100).toFixed(1)}%</div></div>

      ${totalErrors ? `<div class="metric"><div class="metric-label">total errors</div><div class="metric-value">${fmtInt(totalErrors)}</div><div class="metric-sub">non-success runs</div></div>` : ''}
      <div class="metric"><div class="metric-label">best pair</div><div class="metric-value">${best.accuracy_pct.toFixed(1)}%</div><div class="metric-sub">${mShort(best.model)} + ${sShort(best.solver)}</div></div>
      <div class="metric"><div class="metric-label">worst pair</div><div class="metric-value">${worst.accuracy_pct.toFixed(1)}%</div><div class="metric-sub">${mShort(worst.model)} + ${sShort(worst.solver)}</div></div>

    </div>
    <div class="charts-grid">
      <div class="chart-card full">

      <div class="chart-card full">
        <div class="section-title">Tool hallucination by pair — real / text-encoded / invented (planner solvers only)</div>
        <div class="legend" id="legHallu"></div>
        <div style="position:relative;width:100%;height:240px;"><canvas id="cHallu">Hallucination per pair.</canvas></div>
        <div class="detail-notice" id="halluTopNotice" style="margin-top:10px;"></div>
      </div>
      <div class="chart-card full">
        <div class="section-title">Duplicate tool calls by pair — dup_% (bar) and worst single-call repeats (label)</div>
        <div class="legend" id="legDup"></div>
        <div style="position:relative;width:100%;height:240px;"><canvas id="cDup">Duplicate calls per pair.</canvas></div>
      </div>
      <div class="chart-card full">
        <div class="section-title">Empty reasoning by pair — % of intermediate llm_output steps with empty content</div>
        <div class="legend" id="legEmpty"></div>
        <div style="position:relative;width:100%;height:240px;"><canvas id="cEmpty">Empty reasoning per pair.</canvas></div>
      </div>
      ` : ''}
    </div>
    <div class="section-title">Full results table</div>
    <div class="table-card"><table id="resultsTable">
      <thead><tr><th>Model</th><th>Solver</th><th>Runs (n)</th><th>Correct</th><th title="Top: accuracy over successful runs. Bottom: accuracy over all runs incl. failures.">Accuracy<br><small style="font-weight:400;opacity:0.6">ok / all</small></th>${hasTokens ? '<th>Avg tok/run</th><th>Total tok</th>' : '<th>Mean time (s)</th>'}<th>Errors</th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table></div>
    ${hasDetail ? `
    <div class="section-title" id="heatmapTitle">Accuracy heatmap — model+solver vs lab</div>
    <div id="heatmapNotice" class="detail-notice">Showing accuracy per model+solver across labs. Big number = accuracy over <b>successful</b> runs (matches the table); small "all" number = accuracy over <b>all</b> runs incl. failures. Select a lab to see per-question breakdown.</div>
    <div class="heatmap-wrap"><table class="heatmap" id="heatmapTable"></table></div>
    ` : '<div class="detail-notice">Load a <code>partial_results.json</code> to see heatmap breakdown.</div>'}
  `;

  // Wire up filter listeners
  document.getElementById('fModel').addEventListener('change', () => onFilterChange(data, pairs, hasDetail, rawResults));
  document.getElementById('fSolver').addEventListener('change', () => onFilterChange(data, pairs, hasDetail, rawResults));
  if (hasDetail) {
    document.getElementById('fLab').addEventListener('change', () => onFilterChange(data, pairs, hasDetail, rawResults));
  }

  buildCharts(data, pairs, models, solvers);
  if (hasLogAnalytics(data)) buildLogAnalyticsCharts(data, pairs);
  updateTable(pairs);
  if (hasDetail) updateHeatmap(rawResults);
}

function onFilterChange(data, pairs, hasDetail, rawResults) {
  if (hasDetail) {
    const fLab = document.getElementById('fLab').value;
    const filtered = fLab ? rawResults.filter(r => r.lab_name === fLab) : rawResults;
    const recomputedPairs = derivePairSummary(filtered);
    updateTable(recomputedPairs);
    updateHeatmap(rawResults);
  } else {
    updateTable(pairs || data.pair_summary);
  }
}

function buildCharts(data, pairs, models, solvers) {
  const hasTokens = pairs.some(p => (p.sum_tokens_total || 0) > 0);
  const solverColors = Object.fromEntries(solvers.map((s, i) => [s, COLORS[i % COLORS.length]]));
  const datasets1 = solvers.map((s, i) => ({
    label: sShort(s),
    data: models.map(m => { const p = pairs.find(p => p.model===m && p.solver===s); return p ? parseFloat(p.accuracy_pct.toFixed(1)) : null; }),
    backgroundColor: COLORS[i % COLORS.length] + 'cc',
    borderColor: COLORS[i % COLORS.length],
    borderWidth: 1,
    borderRadius: 3
  }));
  const leg1 = document.getElementById('leg1');
  solvers.forEach((s, i) => { leg1.innerHTML += `<span class="legend-item"><span class="legend-swatch" style="background:${COLORS[i%COLORS.length]}"></span>${sShort(s)}</span>`; });
  charts.c1 = new Chart(document.getElementById('c1'), {
    type: 'bar',
    data: { labels: models.map(mShort), datasets: datasets1 },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { min:0, max:100, ticks: { callback: v => v+'%', color:'#888', font:{size:10} }, grid: { color:'rgba(128,128,128,0.12)' } }, x: { ticks: { color:'#888', font:{size:10} }, grid: { display:false } } } }
  });

  // c2: mean tokens/run per (model, solver) when tokens are available; fall
  // back to mean time per model otherwise.
  const leg2 = document.getElementById('leg2');
  if (hasTokens) {
    const datasets2 = solvers.map((s, i) => ({
      label: sShort(s),
      data: models.map(m => { const p = pairs.find(p => p.model===m && p.solver===s); return p ? (p.mean_tokens_total || 0) : null; }),
      backgroundColor: COLORS[i%COLORS.length]+'cc',
      borderColor: COLORS[i%COLORS.length],
      borderWidth: 1,
      borderRadius: 3,
    }));
    solvers.forEach((s, i) => { leg2.innerHTML += `<span class="legend-item"><span class="legend-swatch" style="background:${COLORS[i%COLORS.length]}"></span>${sShort(s)}</span>`; });
    charts.c2 = new Chart(document.getElementById('c2'), {
      type: 'bar',
      data: { labels: models.map(mShort), datasets: datasets2 },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>`${i.dataset.label}: ${fmtInt(i.raw)} tok/run`}}}, scales:{ y:{ticks:{callback:v=>v>=1000?(v/1000).toFixed(1)+'k':v,color:'#888',font:{size:10}},grid:{color:'rgba(128,128,128,0.12)'}}, x:{ticks:{color:'#888',font:{size:10}},grid:{display:false}} } }
    });
  } else {
    const modelTimeData = models.map(m => {
      const ps = pairs.filter(p => p.model === m);
      return parseFloat((ps.reduce((a,b)=>a+b.mean_time_s,0)/ps.length).toFixed(2));
    });
    models.forEach((m, i) => { leg2.innerHTML += `<span class="legend-item"><span class="legend-swatch" style="background:${COLORS[i%COLORS.length]}"></span>${mShort(m)}</span>`; });
    charts.c2 = new Chart(document.getElementById('c2'), {
      type: 'bar',
      data: { labels: models.map(mShort), datasets: [{ label: 'Avg time (s)', data: modelTimeData, backgroundColor: models.map((_,i)=>COLORS[i%COLORS.length]+'bb'), borderColor: models.map((_,i)=>COLORS[i%COLORS.length]), borderWidth:1, borderRadius:3 }] },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{ticks:{callback:v=>v+'s',color:'#888',font:{size:10}},grid:{color:'rgba(128,128,128,0.12)'}}, x:{ticks:{color:'#888',font:{size:10}},grid:{display:false}} } }
    });
  }

  // c3: tokens vs accuracy scatter when tokens are available, else speed.
  const xField = hasTokens ? 'mean_tokens_total' : 'mean_time_s';
  const xLabel = hasTokens ? 'Mean tokens / run' : 'Mean time (s)';
  const scatterDatasets = models.map((m, i) => ({
    label: mShort(m),
    data: pairs.filter(p=>p.model===m).map(p=>({ x: parseFloat((p[xField] || 0).toFixed ? p[xField].toFixed(2) : p[xField]), y: parseFloat(p.accuracy_pct.toFixed(1)), r: Math.max(5, p.n/25), solver: sShort(p.solver) })),
    backgroundColor: COLORS[i%COLORS.length]+'99',
    borderColor: COLORS[i%COLORS.length],
    borderWidth: 1.5
  }));
  const leg3 = document.getElementById('leg3');
  models.forEach((m, i) => { leg3.innerHTML += `<span class="legend-item"><span class="legend-swatch" style="background:${COLORS[i%COLORS.length]}"></span>${mShort(m)}</span>`; });
  charts.c3 = new Chart(document.getElementById('c3'), {
    type: 'bubble',
    data: { datasets: scatterDatasets },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>`${i.dataset.label}/${i.raw.solver}: ${i.raw.y}% @ ${hasTokens ? fmtInt(i.raw.x)+' tok' : i.raw.x+'s'}`}}}, scales:{ y:{min:-5,max:105,ticks:{callback:v=>v+'%',color:'#888',font:{size:10}},grid:{color:'rgba(128,128,128,0.12)'},title:{display:true,text:'Accuracy',color:'#888',font:{size:10}}}, x:{ticks:{color:'#888',font:{size:10},callback:v=>hasTokens && v>=1000?(v/1000).toFixed(1)+'k':v},grid:{color:'rgba(128,128,128,0.12)'},title:{display:true,text:xLabel,color:'#888',font:{size:10}}} } }
  });

  const labels4 = pairs.map(p => mShort(p.model)+'\n'+sShort(p.solver));
  charts.c4 = new Chart(document.getElementById('c4'), {
    type: 'bar',
    data: { labels: labels4, datasets: [
      { label:'Correct', data: pairs.map(p=>p.correct), backgroundColor:'#1D9E7599', borderColor:'#1D9E75', borderWidth:1, borderRadius:2 },
      { label:'Incorrect', data: pairs.map(p=>p.n-p.correct), backgroundColor:'#D85A3099', borderColor:'#D85A30', borderWidth:1 }
    ]},
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{stacked:true,ticks:{color:'#888',font:{size:8},maxRotation:55,autoSkip:false},grid:{display:false}}, y:{stacked:true,ticks:{color:'#888',font:{size:10}},grid:{color:'rgba(128,128,128,0.12)'}} } }
  });

  // Error breakdown — stacked bar of error_type per (model, solver).
  const cErrEl = document.getElementById('cErr');
  if (cErrEl) {
    const errLabels = pairs.map(p => mShort(p.model)+'\n'+sShort(p.solver));
    const errDatasets = ERROR_TYPES.map(et => ({
      label: et,
      data: pairs.map(p => (p.errors && p.errors[et]) || 0),
      backgroundColor: ERROR_COLORS[et] + 'cc',
      borderColor: ERROR_COLORS[et],
      borderWidth: 1,
    }));
    const legErr = document.getElementById('legErr');
    ERROR_TYPES.forEach(et => { legErr.innerHTML += `<span class="legend-item"><span class="legend-swatch" style="background:${ERROR_COLORS[et]}"></span>${et}</span>`; });
    charts.cErr = new Chart(cErrEl, {
      type: 'bar',
      data: { labels: errLabels, datasets: errDatasets },
      options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>`${i.dataset.label}: ${i.raw}`}}}, scales:{ x:{stacked:true,ticks:{color:'#888',font:{size:8},maxRotation:55,autoSkip:false},grid:{display:false}}, y:{stacked:true,ticks:{color:'#888',font:{size:10}},grid:{color:'rgba(128,128,128,0.12)'}} } }
    });
  }
}

/** Render the three log-analytics charts: hallucination / duplicates / empty
 *  reasoning. All three share the same X axis: one tick per (model, solver) pair
 *  that appears in `pairs`, in the same order as the rest of the dashboard. */
function buildLogAnalyticsCharts(data, pairs) {
  const la = data.log_analytics;
  const labels = pairs.map(p => mShort(p.model)+'\n'+sShort(p.solver));

  // --- Hallucination ---
  // Stacked bar of real tool calls, text-encoded tool calls, and total invented.
  // "Total invented" double-counts emissions already in real/text — that's fine
  // because the goal is to make the "did the model invent tools?" signal stand
  // out next to the legitimate volume.
  const hallu = pairs.map(p => {
    const a = getPairAnalytics(la, p.model, p.solver);
    if (!a || !a.hallucination) return { real: 0, text: 0, invented: 0, turns: 0 };
    const h = a.hallucination;
    return {
      real: h.real_tool_calls || 0,
      text: h.text_tool_call_emissions || 0,
      invented: h.total_invented_count || 0,
      turns: h.planner_turns || 0,
    };
  });
  const halluColors = { real: '#1D9E75', text: '#BA7517', invented: '#D85A30' };
  const halluDatasets = [
    { label: 'real_tool_calls', data: hallu.map(x=>x.real), backgroundColor: halluColors.real+'cc', borderColor: halluColors.real, borderWidth:1 },
    { label: 'text_tool_call_emissions', data: hallu.map(x=>x.text), backgroundColor: halluColors.text+'cc', borderColor: halluColors.text, borderWidth:1 },
    { label: 'invented (total)', data: hallu.map(x=>x.invented), backgroundColor: halluColors.invented+'cc', borderColor: halluColors.invented, borderWidth:1 },
  ];
  const legHallu = document.getElementById('legHallu');
  legHallu.innerHTML = '';
  for (const ds of halluDatasets) {
    legHallu.innerHTML += `<span class="legend-item"><span class="legend-swatch" style="background:${ds.borderColor}"></span>${ds.label}</span>`;
  }
  charts.cHallu = new Chart(document.getElementById('cHallu'), {
    type: 'bar',
    data: { labels, datasets: halluDatasets },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:i=>{
          const h = hallu[i.dataIndex];
          return `${i.dataset.label}: ${i.raw} (planner_turns=${h.turns})`;
        }}}
      },
      scales:{
        x:{stacked:true, ticks:{color:'#888',font:{size:8},maxRotation:55,autoSkip:false}, grid:{display:false}},
        y:{stacked:true, ticks:{color:'#888',font:{size:10}}, grid:{color:'rgba(128,128,128,0.12)'}}
      }
    }
  });

  // Collect the global top invented tool names across all pairs.
  const invCounts = {};
  for (const v of Object.values(la.per_pair)) {
    const top = (v.hallucination && v.hallucination.top_invented_names) || [];
    for (const entry of top) {
      // entry is [name, count] in the Counter.most_common() shape
      const name = entry[0], count = entry[1];
      invCounts[name] = (invCounts[name] || 0) + count;
    }
  }
  const topInv = Object.entries(invCounts).sort((a,b)=>b[1]-a[1]).slice(0, 8);
  const halluNotice = document.getElementById('halluTopNotice');
  if (halluNotice) {
    halluNotice.innerHTML = topInv.length
      ? 'Top invented tool names across all pairs: ' + topInv.map(([n,c]) => `<code>${n}</code> (${c})`).join(', ')
      : 'No invented tool names recorded.';
  }

  // --- Duplicates ---
  // Single bar per pair: dup_% (0..100). Worst single-call repeat surfaced via
  // a chart-level data-label tooltip and per-bar label.
  const dup = pairs.map(p => {
    const a = getPairAnalytics(la, p.model, p.solver);
    if (!a || !a.duplicates) return { pct: 0, worst: 0, total: 0, dupes: 0 };
    const d = a.duplicates;
    return {
      pct: +( (d.dup_ratio || 0) * 100 ).toFixed(1),
      worst: d.worst_single_repeat_in_a_run || 0,
      total: d.total_calls || 0,
      dupes: d.duplicate_calls || 0,
    };
  });
  const legDup = document.getElementById('legDup');
  legDup.innerHTML = `<span class="legend-item"><span class="legend-swatch" style="background:#7F77DD"></span>dup_% per pair</span>`
    + `<span class="legend-item" style="margin-left:14px;">Numbers on top: worst single-call repeat in a single run</span>`;
  // Custom plugin to draw the "worst" value on top of each bar.
  const worstLabelPlugin = {
    id: 'worstLabel',
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      const ds = chart.data.datasets[0];
      const meta = chart.getDatasetMeta(0);
      ctx.save();
      ctx.font = '10px var(--font-mono, monospace)';
      ctx.fillStyle = '#666';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      meta.data.forEach((bar, i) => {
        const w = dup[i] && dup[i].worst;
        if (w && w > 1) ctx.fillText(`×${w}`, bar.x, bar.y - 2);
      });
      ctx.restore();
    }
  };
  charts.cDup = new Chart(document.getElementById('cDup'), {
    type: 'bar',
    data: { labels, datasets: [{
      label: 'dup_%',
      data: dup.map(x=>x.pct),
      backgroundColor: '#7F77DDcc',
      borderColor: '#7F77DD',
      borderWidth: 1,
      borderRadius: 2,
    }]},
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:i=>{
          const d = dup[i.dataIndex];
          return `dup_%: ${d.pct}%  (${d.dupes}/${d.total} dup/total, worst x${d.worst})`;
        }}}
      },
      scales:{
        x:{ticks:{color:'#888',font:{size:8},maxRotation:55,autoSkip:false}, grid:{display:false}},
        y:{min:0, max:100, ticks:{callback:v=>v+'%', color:'#888', font:{size:10}}, grid:{color:'rgba(128,128,128,0.12)'}}
      }
    },
    plugins: [worstLabelPlugin],
  });

  // --- Empty reasoning ---
  // Stacked bar of % empty per intermediate node (reason / act / planner /
  // validation). Each pair only contributes to the nodes its solver uses, so
  // most pairs will show a single coloured segment.
  const nodes = ['reason', 'act', 'planner', 'validation'];
  const nodeColors = { reason: '#378ADD', act: '#1D9E75', planner: '#D4537E', validation: '#BA7517' };
  const emptyPerNode = {};
  for (const n of nodes) emptyPerNode[n] = [];
  const emptyTooltipData = pairs.map(p => {
    const a = getPairAnalytics(la, p.model, p.solver);
    const byNode = (a && a.empty_reasoning && a.empty_reasoning.by_node) || {};
    const result = { byNode };
    for (const n of nodes) {
      const b = byNode[n];
      const pct = b && b.total > 0 ? +(b.empty / b.total * 100).toFixed(1) : 0;
      emptyPerNode[n].push(pct);
    }
    return result;
  });
  const emptyDatasets = nodes.map(n => ({
    label: n,
    data: emptyPerNode[n],
    backgroundColor: nodeColors[n] + 'cc',
    borderColor: nodeColors[n],
    borderWidth: 1,
  }));
  const legEmpty = document.getElementById('legEmpty');
  legEmpty.innerHTML = '';
  for (const n of nodes) {
    legEmpty.innerHTML += `<span class="legend-item"><span class="legend-swatch" style="background:${nodeColors[n]}"></span>${n}</span>`;
  }
  charts.cEmpty = new Chart(document.getElementById('cEmpty'), {
    type: 'bar',
    data: { labels, datasets: emptyDatasets },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:i=>{
          const node = i.dataset.label;
          const byNode = emptyTooltipData[i.dataIndex].byNode || {};
          const b = byNode[node];
          if (!b || !b.total) return `${node}: n/a`;
          return `${node}: ${i.raw}%  (${b.empty}/${b.total} empty/total)`;
        }}}
      },
      scales:{
        x:{ticks:{color:'#888',font:{size:8},maxRotation:55,autoSkip:false}, grid:{display:false}},
        y:{min:0, max:100, ticks:{callback:v=>v+'%', color:'#888', font:{size:10}}, grid:{color:'rgba(128,128,128,0.12)'}}
      }
    }
  });
}

function updateTable(pairs) {
  const fModel = document.getElementById('fModel').value;
  const fSolver = document.getElementById('fSolver').value;
  const filtered = pairs.filter(p => (!fModel || p.model===fModel) && (!fSolver || p.solver===fSolver));
  const bestAcc = Math.max(...filtered.map(p=>p.accuracy_pct));
  const worstAcc = Math.min(...filtered.map(p=>p.accuracy_pct));
  const hasTokens = filtered.some(p => (p.sum_tokens_total || 0) > 0);
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  filtered.sort((a,b) => b.accuracy_pct - a.accuracy_pct)
    .forEach(p => {
      const badge = p.accuracy_pct === bestAcc ? '<span class="badge badge-best">best</span>' : p.accuracy_pct === worstAcc ? '<span class="badge badge-warn">worst</span>' : '';
      const errSummary = p.errors && Object.keys(p.errors).length
        ? Object.entries(p.errors).map(([k,v]) => `${k.slice(0,3)}=${v}`).join(' ')
        : '—';
      const tokenCells = hasTokens
        ? `<td title="in=${fmtInt(p.mean_tokens_input)}, out=${fmtInt(p.mean_tokens_output)}">${fmtInt(p.mean_tokens_total)}</td><td>${p.sum_tokens_total >= 1e6 ? (p.sum_tokens_total/1e6).toFixed(2)+'M' : (p.sum_tokens_total/1e3).toFixed(1)+'k'}</td>`
        : `<td>${p.mean_time_s.toFixed(2)}</td>`;
      // Two accuracy notions: over successful runs (p.accuracy_pct, denom=n)
      // and end-to-end over all runs incl. failures (denom=n_all). Show both
      // when they differ, so the table matches the heatmap.
      const nAll = p.n_all || p.n;
      const accAll = nAll ? Math.round(p.correct / nAll * 1000) / 10 : 0;
      const accCell = (nAll !== p.n)
        ? `${p.accuracy_pct.toFixed(1)}% ${badge}<div style="font-size:10px;color:var(--color-text-secondary)" title="${p.correct}/${nAll} over all runs incl. ${nAll - p.n} failures">${accAll.toFixed(1)}% all</div>`
        : `${p.accuracy_pct.toFixed(1)}% ${badge}`;
      tbody.innerHTML += `<tr>
        <td>${mShort(p.model)}</td>
        <td>${sShort(p.solver)}</td>
        <td>${p.n}${p.n_all && p.n_all !== p.n ? '/'+p.n_all : ''}</td>
        <td>${p.correct}</td>
        <td title="${p.accuracy_pct.toFixed(1)}% over ${p.n} successful runs">${accCell}</td>
        ${tokenCells}
        <td style="font-size:10px;color:var(--color-text-secondary)">${errSummary}</td>
      </tr>`;
    });
}

/** Interpolate color for heatmap cell: red (0%) -> yellow (50%) -> green (100%) */
function accColor(pct) {
  // 0% = #D85A30 (red), 50% = #BA7517 (amber), 100% = #1D9E75 (green)
  let r, g, b;
  if (pct <= 50) {
    const t = pct / 50;
    r = Math.round(216 + (186 - 216) * t);
    g = Math.round(90 + (117 - 90) * t);
    b = Math.round(48 + (23 - 48) * t);
  } else {
    const t = (pct - 50) / 50;
    r = Math.round(186 + (29 - 186) * t);
    g = Math.round(117 + (158 - 117) * t);
    b = Math.round(23 + (117 - 23) * t);
  }
  return `rgb(${r},${g},${b})`;
}

function accTextColor(pct) {
  // White text on dark backgrounds (low and high), dark on mid
  return (pct < 25 || pct > 75) ? '#fff' : '#1a1a1a';
}

function updateHeatmap(allResults) {
  const fModel = document.getElementById('fModel').value;
  const fSolver = document.getElementById('fSolver').value;
  const fLab = document.getElementById('fLab') ? document.getElementById('fLab').value : '';

  const title = document.getElementById('heatmapTitle');
  const notice = document.getElementById('heatmapNotice');
  const table = document.getElementById('heatmapTable');
  if (!table) return;

  // Filter results by model/solver
  let filtered = allResults;
  if (fModel) filtered = filtered.filter(r => r.model === fModel);
  if (fSolver) filtered = filtered.filter(r => r.solver === fSolver);

  if (fLab) {
    // LAB SELECTED: rows = model+solver, columns = questions in that lab
    filtered = filtered.filter(r => r.lab_name === fLab);
    if (title) title.textContent = `Accuracy heatmap — ${labShort(fLab)}: model+solver vs question`;
    if (notice) notice.innerHTML = `Per-question accuracy for lab "${labShort(fLab)}". Big number = accuracy over <b>successful</b> runs; small "all" number = over <b>all</b> runs incl. failures. Hover a cell for raw counts.`;

    // Get unique questions and row keys
    const questions = [...new Set(filtered.map(r => r.question))].sort();
    const rowKeys = [...new Set(filtered.map(r => r.model + '||' + r.solver))].sort();

    // Aggregate: { rowKey -> { question -> { correct, ok, total } } }
    // ok = successful runs (denom for "accuracy over successful")
    // total = all runs incl. failures (denom for "accuracy over all")
    const data = {};
    for (const r of filtered) {
      const rk = r.model + '||' + r.solver;
      if (!data[rk]) data[rk] = {};
      if (!data[rk][r.question]) data[rk][r.question] = { correct: 0, ok: 0, total: 0 };
      data[rk][r.question].total++;
      if (isSuccessful(r)) data[rk][r.question].ok++;
      if (r.correct) data[rk][r.question].correct++;
    }

    // Build table
    let html = '<thead><tr><th class="corner">Model + Solver</th>';
    for (const q of questions) {
      html += `<th class="col-header" title="${q}">${qShort(q)}</th>`;
    }
    html += '</tr></thead><tbody>';

    for (const rk of rowKeys) {
      const [model, solver] = rk.split('||');
      html += `<tr><th class="row-header">${mShort(model)} + ${sShort(solver)}</th>`;
      for (const q of questions) {
        html += heatCell(data[rk] && data[rk][q]);
      }
      html += '</tr>';
    }
    html += '</tbody>';
    table.innerHTML = html;

  } else {
    // NO LAB SELECTED: rows = model+solver, columns = labs
    if (title) title.textContent = 'Accuracy heatmap — model+solver vs lab';
    if (notice) notice.innerHTML = 'Showing accuracy per model+solver across labs. Big number = accuracy over <b>successful</b> runs (matches the table); small "all" number = over <b>all</b> runs incl. failures. Select a lab to see per-question breakdown.';

    const labs = [...new Set(filtered.map(r => r.lab_name))].sort();
    const rowKeys = [...new Set(filtered.map(r => r.model + '||' + r.solver))].sort();

    // Aggregate: { rowKey -> { lab -> { correct, ok, total } } }
    const data = {};
    for (const r of filtered) {
      const rk = r.model + '||' + r.solver;
      if (!data[rk]) data[rk] = {};
      if (!data[rk][r.lab_name]) data[rk][r.lab_name] = { correct: 0, ok: 0, total: 0 };
      data[rk][r.lab_name].total++;
      if (isSuccessful(r)) data[rk][r.lab_name].ok++;
      if (r.correct) data[rk][r.lab_name].correct++;
    }

    let html = '<thead><tr><th class="corner">Model + Solver</th>';
    for (const lab of labs) {
      html += `<th class="col-header">${labShort(lab)}</th>`;
    }
    html += '</tr></thead><tbody>';

    for (const rk of rowKeys) {
      const [model, solver] = rk.split('||');
      html += `<tr><th class="row-header">${mShort(model)} + ${sShort(solver)}</th>`;
      for (const lab of labs) {
        html += heatCell(data[rk] && data[rk][lab]);
      }
      html += '</tr>';
    }
    html += '</tbody>';
    table.innerHTML = html;
  }
}

/** Whether a raw result row is a successful run. Falls back to "no error_type"
 *  for older logs that predate the `successful` field. */
function isSuccessful(r) {
  if (typeof r.successful === 'boolean') return r.successful;
  return !r.error_type;
}

/** Render one heatmap cell showing BOTH accuracy notions:
 *  - main value + colour = accuracy over successful runs (correct/ok)
 *  - sub value = accuracy over all runs incl. failures (correct/total)
 *  The sub value only appears when some runs failed (total !== ok). */
function heatCell(cell) {
  if (!cell || cell.total === 0) return '<td class="na">—</td>';
  const pctOk = cell.ok > 0 ? cell.correct / cell.ok * 100 : 0;
  const pctAll = cell.correct / cell.total * 100;
  const bg = cell.ok > 0 ? accColor(pctOk) : 'var(--color-background-secondary)';
  const fg = cell.ok > 0 ? accTextColor(pctOk) : 'var(--color-text-secondary)';
  const failed = cell.total - cell.ok;
  const sub = failed > 0
    ? `<div style="font-size:9px;opacity:0.85">${pctAll.toFixed(0)}% all</div>`
    : '';
  const title = `${cell.correct}/${cell.ok} over successful` +
    (failed > 0 ? ` · ${cell.correct}/${cell.total} over all (${failed} failed)` : '');
  const main = cell.ok > 0 ? `${pctOk.toFixed(0)}%` : 'n/a';
  return `<td style="background:${bg};color:${fg}" title="${title}">${main}${sub}</td>`;
}

setTimeout(() => loadDemo(), 200);
</script>
